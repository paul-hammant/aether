name: Aether CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Core build + smoke tests — Linux (GCC) and Linux (Clang)
  # and macOS (Clang). GCC and Clang have different warning sets
  # so both are worth testing on Linux to catch compiler-specific
  # issues early.
  # ============================================================
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / GCC
            os: ubuntu-22.04
            cc: gcc
            install: sudo apt-get update && sudo apt-get install -y gcc make

          - name: Linux / Clang
            os: ubuntu-22.04
            cc: clang
            install: sudo apt-get update && sudo apt-get install -y clang make

          - name: macOS / Clang
            os: macos-latest
            cc: clang
            install: ""   # Xcode CLT already present on macOS runners

    steps:
    - uses: actions/checkout@v4

    - name: Install toolchain
      if: matrix.install != ''
      run: ${{ matrix.install }}

    - name: Build compiler
      run: CC=${{ matrix.cc }} make compiler

    - name: Build ae CLI
      run: CC=${{ matrix.cc }} make ae

    - name: Run runtime test suite
      run: make test

    - name: Smoke test — example programs
      run: |
        ./build/ae run examples/basics/hello.ae
        ./build/ae run examples/actors/counter.ae
        ./build/ae run examples/actors/ping-pong.ae

    - name: Smoke test — project init + run
      run: |
        ./build/ae init smoketest
        cd smoketest && ../build/ae run
        cd .. && rm -rf smoketest

  # ============================================================
  # Memory safety — Valgrind + AddressSanitizer on Linux/GCC
  # ============================================================
  memory-checks:
    name: Memory Safety (Valgrind + ASan)
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y valgrind gcc-multilib

    - name: Valgrind — runtime test suite
      run: |
        CFLAGS="-g -O0" make compiler
        CFLAGS="-g -O0" make test-build
        valgrind --leak-check=full \
                 --show-leak-kinds=all \
                 --track-origins=yes \
                 --error-exitcode=0 \
                 --log-file=valgrind.log \
                 ./build/test_runner 2>&1 || true
        if grep -q "definitely lost: 0 bytes" valgrind.log && \
           grep -q "indirectly lost: 0 bytes" valgrind.log; then
          echo "No memory leaks detected"
        else
          echo "WARNING: Memory leaks detected (non-fatal)"
          head -100 valgrind.log
        fi
      continue-on-error: true

    - name: AddressSanitizer — runtime test suite
      run: |
        make clean
        make compiler CFLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
                      LDFLAGS="-fsanitize=address -pthread -lm"
        make test-build CFLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
                        LDFLAGS="-fsanitize=address -pthread -lm"
        ASAN_OPTIONS=detect_leaks=1:check_initialization_order=1 \
          ./build/test_runner 2>&1 | tee asan.log
        if grep -q "ERROR: AddressSanitizer" asan.log; then
          echo "ERROR: AddressSanitizer detected errors!"
          cat asan.log
          exit 1
        fi

    - name: Upload memory reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: memory-reports
        path: |
          valgrind.log
          asan.log
        retention-days: 7
